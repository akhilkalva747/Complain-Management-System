# ===============================
# Application Configuration
# ===============================
spring.application.name=complaint-management-system

# ===============================
# Database Configuration (Cloud Ready)
# ===============================
# Uses environment variables (Render will inject values)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming Strategy (keep as-is)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ===============================
# Server Configuration
# ===============================
server.port=8080

# ===============================
# CORS Configuration
# ===============================
# Allow all origins (safe for demo/project)
app.cors.allowed-origins=*

# ===============================
# JWT Configuration
# ===============================
app.jwt.secret=ComplaintMgmtSystem2024SecretKey!XyZ9876543210ABCDEFabcdef
app.jwt.expiration=86400000
